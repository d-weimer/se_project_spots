<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spots</title>
    <meta
      name="description"
      content="Spots is an interactive image-sharing site. Users will be able to add and remove photos, like photos from other users, and make minor adjustments to their profile."
    />
    <meta name="author" content="Daniel J. Weiemr" />
    <meta
      name="keywords"
      content="image sharing application, interactive image feed, photo sharing app, user profile management, spots"
    />
  </head>
  <body>
    <div class="page">
      <header class="header">
        <img
          src="<%=require('./images/spots_logo.svg')%>"
          alt="Spots Logo"
          class="header__logo"
        />
      </header>
      <main class="content">
        <section class="profile page__section">
          <div class="profile__avatar-container">
            <button class="profile__avatar-button">
              <img
                src="<%=require('./images/edit_icon-white.svg')%>"
                alt="Edit icon"
                class="profile__edit-icon"
              />
            </button>
            <img class="profile__avatar" />
          </div>
          <div class="profile__column">
            <h1 class="profile__name"></h1>
            <p class="profile__description"></p>
            <button type="button" class="profile__edit-button">
              <img
                src="<%=require('./images/edit_icon.svg')%>"
                alt="Edit Icon"
              />Edit Profile
            </button>
          </div>
          <button type="button" class="profile__add-button">
            <img
              src="<%=require('./images/plus_icon.svg')%>"
              alt="Plus Icon"
              class="profile__add-icon"
            />New Post
          </button>
        </section>
        <section class="cards page__section">
          <ul class="cards__list">
            <template id="card-template">
              <li class="card">
                <img src="#" alt="" class="card__image" />
                <button type="button" class="card__delete-button"></button>
                <div class="card__content">
                  <h2 class="card__title"></h2>
                  <button type="button" class="card__like-button"></button>
                </div>
              </li>
            </template>
          </ul>
        </section>
      </main>
      <footer class="footer page__section">
        <p class="footer__copyright">2026 &copy; Spots</p>
      </footer>
      <div class="modal" id="edit-profile-modal">
        <div class="modal__container">
          <div class="modal__header">
            <button type="button" class="modal__close-button"></button>
            <h2 class="modal__title">Edit profile</h2>
          </div>
          <form id="edit-profile-form" class="modal__form" novalidate>
            <label for="profile-name-input" class="modal__label"
              >Name
              <input
                id="profile-name-input"
                type="text"
                class="modal__input"
                minlength="2"
                maxlength="40"
                required
                placeholder="Type your name"
              />
              <span id="profile-name-input-error"></span>
            </label>
            <label for="profile-description-input" class="modal__label"
              >Description
              <input
                id="profile-description-input"
                type="text"
                class="modal__input"
                minlength="2"
                maxlength="200"
                required
                placeholder="Describe yourself"
              />
              <span id="profile-description-input-error"></span>
            </label>
            <button type="submit" class="modal__submit-button">Save</button>
          </form>
        </div>
      </div>
      <div class="modal" id="new-post-modal">
        <div class="modal__container">
          <div class="modal__header">
            <button type="button" class="modal__close-button"></button>
            <h2 class="modal__title">New post</h2>
          </div>
          <form id="card-form" class="modal__form" novalidate>
            <label for="card-image-input" class="modal__label"
              >Image link
              <input
                id="card-image-input"
                type="url"
                class="modal__input"
                required
                placeholder="Paste a link to a picture"
              />
              <span id="card-image-input-error"></span>
            </label>
            <label for="card-caption-input" class="modal__label"
              >Caption
              <input
                id="card-caption-input"
                type="text"
                class="modal__input"
                minlength="2"
                maxlength="30"
                required
                placeholder="Type your caption"
              />
              <span id="card-caption-input-error"></span>
            </label>
            <button type="submit" class="modal__submit-button">Save</button>
          </form>
        </div>
      </div>
      <div class="modal modal_preview" id="preview-modal">
        <div class="modal__image-container">
          <button
            type="button"
            class="modal__close-button modal__close-button_preview"
          ></button>
          <img src="#" alt="" class="modal__image" />
          <p class="modal__caption"></p>
        </div>
      </div>
    </div>
    <div class="modal" id="edit-avatar-modal">
      <div class="modal__container">
        <div class="modal__header">
          <button type="button" class="modal__close-button"></button>
          <h2 class="modal__title">Edit profile avatar</h2>
        </div>
        <form id="edit-avatar-form" class="modal__form" novalidate>
          <label for="profile-avatar-input" class="modal__label"
            >Profile Picture
            <input
              id="profile-avatar-input"
              type="url"
              class="modal__input"
              name="avatar"
              required
              placeholder="Paste the link to an image"
            />
            <span id="profile-avatar-input-error"></span>
          </label>
          <button type="submit" class="modal__submit-button">Save</button>
        </form>
      </div>
    </div>
    <div class="modal" id="delete-modal">
      <div class="modal__container">
        <div class="modal__header modal__header-delete-card">
          <button
            type="button"
            class="modal__close-button modal__close-button_preview"
          ></button>
          <h2 class="modal__title modal__title-delete-card">
            Are you sure you want to delete this image?
          </h2>
        </div>
        <form class="modal__form" id="delete-form">
          <div class="modal__delete-buttons">
            <button
              type="submit"
              class="modal__submit-button modal__submit-button-delete-card"
            >
              Delete
            </button>
            <button
              type="button"
              class="modal__submit-button modal__submit-button-delete-card-cancel"
            >
              Cancel
            </button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
